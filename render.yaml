services:
  - type: web
    name: hsconsulting
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c 'set -e; echo "=== MIGRATE ==="; python manage.py migrate --noinput; echo "=== COLLECTSTATIC ==="; python manage.py collectstatic --noinput -v2; echo "=== STARTUP ==="; python manage.py startup; echo "=== GUNICORN ==="; gunicorn config.wsgi:application --log-file - --timeout 600'
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "hsconsulting.onrender.com"
      - key: PYTHON_VERSION
        value: "3.14.3"
