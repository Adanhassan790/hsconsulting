services:
  - type: web
    name: hsconsulting
    runtime: python
    buildCommand: bash -c 'pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear'
    startCommand: bash -c 'python manage.py startup && gunicorn config.wsgi:application --log-file - --timeout 600'
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "hsconsulting.onrender.com"
      - key: PYTHON_VERSION
        value: "3.14.3"
