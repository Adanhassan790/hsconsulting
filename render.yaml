services:
  - type: web
    name: hsconsulting
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput -v2
    startCommand: python manage.py migrate --noinput && python manage.py startup && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers $WEB_CONCURRENCY --log-file -
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "hsconsulting.onrender.com"
      - key: PYTHON_VERSION
        value: "3.14.3"
