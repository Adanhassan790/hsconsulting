{% extends 'base/base.html' %}

{% block title %}Client Dashboard - HS Consulting{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <h1 class="mb-4 text-danger">Client Dashboard</h1>
        
        <div class="row">
            <div class="col-md-3">
                <div class="card bg-light">
                    <div class="card-body text-center">
                        <h5 class="card-title">Upcoming Appointments</h5>
                        <h2 class="text-danger">{{ upcoming_appointments.count }}</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-light">
                    <div class="card-body text-center">
                        <h5 class="card-title">Documents</h5>
                        <h2 class="text-danger">{{ documents.count }}</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">Quick Actions</h5>
                    </div>
                    <div class="card-body">
                        <a href="{% url 'appointments:book' %}" class="btn btn-danger mb-2 w-100">Book Appointment</a>
                        <a href="{% url 'clients:documents' %}" class="btn btn-secondary w-100">View Documents</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
