[[services]]
type = "web"
name = "hsconsulting"
runtime = "python"
buildCommand = "pip install -r requirements.txt"
startCommand = "python startup.py && gunicorn config.wsgi:application --workers 2 --worker-class sync --bind 0.0.0.0:8080 --timeout 600 --log-level info"
region = "eu"
plan = "hobby"

[[services]]
type = "postgres"
name = "hsconsulting-db"
plan = "hobby"
region = "eu"
databaseName = "hsconsulting_db"

